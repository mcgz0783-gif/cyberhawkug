name: Deploy Frontend and Supabase Edge Functions

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Vercel CLI
      run: npm i -g vercel@latest

    - name: Install Supabase CLI
      run: npm i -g supabase

    - name: Pull Vercel environment information
      run: vercel pull --yes --environment=production
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    - name: Build Project artifacts
      run: npm run build
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

    - name: Deploy Project artifacts to Vercel
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: vercel deploy --prebuilt --prod --confirm --alias www.cyberhawk-ug.store
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

    - name: Deploy Supabase Edge Functions
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        supabase secrets set SUPABASE_URL "$SUPABASE_URL" --project-ref "$SUPABASE_PROJECT_ID"
        supabase secrets set SUPABASE_PUBLISHABLE_KEY "$SUPABASE_PUBLISHABLE_KEY" --project-ref "$SUPABASE_PROJECT_ID"
        supabase secrets set SUPABASE_ANON_KEY "$SUPABASE_ANON_KEY" --project-ref "$SUPABASE_PROJECT_ID"
        supabase secrets set SUPABASE_SERVICE_ROLE_KEY "$SUPABASE_SERVICE_ROLE_KEY" --project-ref "$SUPABASE_PROJECT_ID"
        for fn in $(find supabase/functions -maxdepth 1 -mindepth 1 -type d -printf '%f\n'); do
          supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_ID"
        done
      env:
        SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
